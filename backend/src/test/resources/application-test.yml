spring:
  datasource:
    url: jdbc:h2:mem:taskflow;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

taskflow:
  jwt:
    secret: test-secret-key-that-is-long-enough-to-be-secure-256-bits-minimum!!
    expiration-minutes: 60
